name: CI/CD - Task Manager Flask

on:
  push:
    branches:
      - main
      - stage
      - development
      - production
  pull_request:
    branches:
      - main
      - stage

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Atualizar pip
        run: python -m pip install --upgrade pip

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Validar Flask
        run: python -c "import flask; print('Flask importado com sucesso')"

      - name: Executar testes automatizados
        run: pytest

      - name: Build da imagem Docker
        run: docker build -t task-manager-flask .

  review:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'

    steps:
      - name: Ambiente temporario de review
        run: |
          echo "Ambiente temporario de review criado para avaliacao manual do Pull Request"
          echo "Branch de origem: ${{ github.head_ref }}"

  deploy-stage:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/stage'

    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v4

      - name: Build da imagem Docker para stage
        run: docker build -t task-manager-flask .

      - name: Executar aplicacao em ambiente de stage
        run: |
          docker run -d -p 5000:5000 --name task-manager-stage task-manager-flask
          sleep 15
          curl http://127.0.0.1:5000

  dast-stage:
    runs-on: ubuntu-latest
    needs: deploy-stage
    if: github.ref == 'refs/heads/stage'

    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t task-manager-flask .

      - name: Subir aplicacao para analise DAST em stage
        run: |
          docker run -d -p 5000:5000 --name task-manager-stage task-manager-flask
          sleep 15
          curl http://127.0.0.1:5000

      - name: Criar pasta do relatorio ZAP
        run: mkdir -p zap-stage-reports

      - name: Executar OWASP ZAP no ambiente de stage
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}/zap-stage-reports:/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://127.0.0.1:5000 \
            -r zap-stage-report.html || true

      - name: Listar relatorios gerados
        run: ls -la zap-stage-reports

      - name: Publicar relatorio ZAP como artefato
        uses: actions/upload-artifact@v4
        with:
          name: zap-stage-report
          path: zap-stage-reports/zap-stage-report.html
