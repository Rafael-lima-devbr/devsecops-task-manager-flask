name: CI - Task Manager Flask

on:
  push:
    branches:
      - main
      - master
      - development
      - stage
      - production
  pull_request:
    branches:
      - main
      - master

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Atualizar pip
        run: python -m pip install --upgrade pip

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Validar Flask
        run: python -c "import flask; print('Flask importado com sucesso')"

      - name: Executar testes automatizados
        run: pytest

      - name: Build da imagem Docker
        run: docker build -t task-manager-flask .
